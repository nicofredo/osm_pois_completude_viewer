<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Complétude POIs OSM</title>
    <link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>
    <script src="https://unpkg.com/pmtiles@latest/dist/pmtiles.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: sans-serif;
        }

        #map {
            width: 100%;
            height: 100dvh;
        }

        /* ── Controls panel ─────────────────────────────────────── */

        #controls {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 11;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            padding: 12px 16px;
            width: 260px;
            max-height: calc(100dvh - 80px);
            overflow-y: auto;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        /* Collapsed state on mobile */
        #controls.collapsed {
            transform: translateX(calc(-100% - 20px));
            opacity: 0;
            pointer-events: none;
        }

        /* Mobile toggle button */
        #toggle-controls {
            display: none;
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 11;
            background: white;
            border: none;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            padding: 10px 12px;
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            color: #444;
        }

        #toggle-controls:hover {
            background: #f0f0f0;
        }

        /* Mobile backdrop */
        #controls-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9;
            background: rgba(0, 0, 0, 0.25);
        }

        h2 {
            color: #000;
            text-align: center;
            font-size: 16px;
            margin: 0 0 10px;
            line-height: 1.4;
        }

        #source-code {
            font-size: 11px;
        }

        .section-label {
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #888;
            margin: 0 0 6px;
        }

        .divider {
            border: none;
            border-top: 1px solid #eee;
            margin: 10px 0;
        }

        .toggle-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 0;
        }

        .layer-btn {
            flex: 1;
            padding: 7px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            font-size: 12px;
            color: #444;
            text-align: center;
        }

        .layer-btn:hover {
            background: #f0f0f0;
        }

        .layer-btn.active {
            background: #e8f0fe;
            border-color: #4285f4;
            color: #1a56db;
            font-weight: 500;
        }

        .mode-row {
            display: flex;
            flex-direction: row;
            gap: 6px;
            margin-bottom: 0;
        }

        .mode-btn {
            flex: 1;
            padding: 7px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            font-size: 12px;
            color: #444;
            text-align: center;
        }

        .mode-btn:hover {
            background: #f0f0f0;
        }

        .mode-btn.active {
            background: #e8f0fe;
            border-color: #4285f4;
            color: #1a56db;
            font-weight: 500;
        }

        .tag-btn {
            display: block;
            width: 100%;
            text-align: left;
            padding: 7px 10px;
            margin-bottom: 4px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            font-size: 12px;
            color: #444;
        }

        .tag-btn:hover {
            background: #f0f0f0;
        }

        .tag-btn.active {
            background: #e8f0fe;
            border-color: #4285f4;
            color: #1a56db;
            font-weight: 500;
        }

        #circle-size-section {
            display: none;
        }

        .circle-size-row {
            display: flex;
            flex-direction: row;
            gap: 6px;
            margin-bottom: 0;
        }

        .circle-size-btn {
            flex: 1;
            padding: 7px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            font-size: 12px;
            color: #444;
            text-align: center;
        }

        .circle-size-btn:hover {
            background: #f0f0f0;
        }

        .circle-size-btn.active {
            background: #e8f0fe;
            border-color: #4285f4;
            color: #1a56db;
            font-weight: 500;
        }

        /* ── Legend ─────────────────────────────────────────────── */

        #legend {
            position: absolute;
            bottom: 10px;
            left: 10px;
            z-index: 10;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            padding: 10px 14px;
            font-size: 12px;
        }

        #legend-bar {
            width: 160px;
            height: 10px;
            border-radius: 4px;
            background: linear-gradient(to right, #d73027, #fee08b, #1a9850);
            margin-bottom: 4px;
        }

        #legend-labels {
            display: flex;
            justify-content: space-between;
            color: #666;
        }

        /* ── Popup ──────────────────────────────────────────────── */

        .maplibregl-popup-close-button {
            font-size: 16px;
            color: #888;
            padding: 4px 8px;
        }

        .maplibregl-popup-close-button:hover {
            color: #333;
            background: transparent;
        }

        /* ── Mobile breakpoint ──────────────────────────────────── */

        @media (max-width: 600px) {

            /* Show the toggle button */
            #toggle-controls {
                display: block;
            }

            /* Panel slides in from left, full-width-ish */
            #controls {
                top: 0;
                left: 0;
                border-radius: 0 8px 8px 0;
                width: min(280px, 88vw);
                max-height: 100dvh;
                padding-top: 16px;
                padding-bottom: 16px;
            }

            /* When open, show backdrop */
            #controls:not(.collapsed)~#controls-backdrop {
                display: block;
            }

            /* Legend moves up a touch on mobile so it clears the map controls */
            #legend {
                bottom: 10px;
                left: 10px;
            }

            /* Popups shouldn't overflow screen */
            .maplibregl-popup-content {
                max-width: 85vw !important;
            }
        }

        /* ── Tablet: slightly narrower panel ────────────────────── */

        @media (min-width: 601px) and (max-width: 900px) {
            #controls {
                width: 230px;
            }
        }
    </style>
</head>

<body>
    <div id="map">
        <!-- Mobile hamburger toggle -->
        <button id="toggle-controls" aria-label="Ouvrir le panneau de contrôle">☰</button>

        <!-- Click-outside backdrop (mobile only) -->
        <div id="controls-backdrop"></div>

        <div id="controls">
            <h2>Complétude des POIs OSM par territoire</h2>

            <p class="section-label">Couche</p>
            <div class="toggle-row">
                <button class="layer-btn" data-layer="regions">Régions</button>
                <button class="layer-btn" data-layer="departements">Départements</button>
                <button class="layer-btn" data-layer="epci">EPCI</button>
                <button class="layer-btn" data-layer="communes">Communes</button>
            </div>

            <hr class="divider" />

            <p class="section-label">Mode d'affichage</p>
            <div class="mode-row">
                <button class="mode-btn" data-mode="boundary">Boundaries</button>
                <button class="mode-btn" data-mode="centroid">Cercles</button>
            </div>

            <hr class="divider" />

            <p class="section-label">Fraîcheur POIs</p>
            <button class="tag-btn" data-tag="__freshness__" data-label="Fraîcheur des POIs">Âge moyen mise à jour POIs</button>

            <div id="circle-size-section">
                <hr class="divider" />
                <p class="section-label">Taille des cercles</p>
                <div class="mode-row">
                    <button class="circle-size-btn" data-circle-size="total"
                        title="Taille proportionnelle au nombre total de POIs">Total POIs</button>
                    <button class="circle-size-btn" data-circle-size="missing"
                        title="Taille proportionnelle aux POIs sans le tag sélectionné">POIs sans le tag</button>
                </div>
            </div>

            <hr class="divider" />

            <p class="section-label">Tags</p>
            <button class="tag-btn" data-tag="nb_siret" data-label="Complétude SIRET" title="Tag ref:FR:SIRET">SIRET</button>
            <button class="tag-btn" data-tag="nb_name" data-label="Complétude Name" title="Tag name">Name</button>
            <button class="tag-btn" data-tag="nb_phone" data-label="Complétude Phone, Mobile"
                title="Tags phone, contact:phone, mobile, contact:mobile">Phone | Mobile</button>
            <button class="tag-btn" data-tag="nb_website_merge" data-label="Complétude Website, Fb, Insta"
                title="Tags website, contact:website, facebook, contact:facebook, instagram, contact:instagram">Website |
                Facebook | Instagram</button>
            <button class="tag-btn" data-tag="nb_email" data-label="Complétude Email"
                title="Tags email, contact:email">Email</button>
            <button class="tag-btn" data-tag="nb_opening_hours" data-label="Complétude Opening hours"
                title="Tag opening_hours">Opening hours</button>
            <button class="tag-btn" data-tag="nb_wheelchair" data-label="Complétude Wheelchair"
                title="Tag wheelchair">Wheelchair</button>
            <br>
            <div id="update-time"></div>
            <a href="https://github.com/nicofredo/osm_pois_completude_viewer" target="_blank" id="source-code">Code source</a>
        </div>

        <div id="legend">
            <div id="legend-bar"></div>
            <div id="legend-labels"><span>0%</span><span>50%</span><span>100%</span></div>
        </div>
    </div>


    <script>
        // ── Mobile panel toggle ───────────────────────────────────────────────

        const controlsPanel = document.getElementById('controls');
        const toggleBtn = document.getElementById('toggle-controls');
        const backdrop = document.getElementById('controls-backdrop');

        const isTouch = window.matchMedia('(hover: none)').matches;

        function isMobile() { return window.innerWidth <= 600; }

        function openPanel() {
            controlsPanel.classList.remove('collapsed');
            toggleBtn.textContent = '✕';
            backdrop.style.display = 'block';
        }

        function closePanel() {
            controlsPanel.classList.add('collapsed');
            toggleBtn.textContent = '☰';
            backdrop.style.display = 'none';
        }

        function initPanelState() {
            if (isMobile()) {
                closePanel();
            } else {
                controlsPanel.classList.remove('collapsed');
                backdrop.style.display = 'none';
            }
        }

        toggleBtn.addEventListener('click', () => {
            if (controlsPanel.classList.contains('collapsed')) {
                openPanel();
            } else {
                closePanel();
            }
        });

        backdrop.addEventListener('click', closePanel);

        document.querySelectorAll('.tag-btn, .layer-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (isMobile()) closePanel();
            });
        });

        window.addEventListener('resize', initPanelState);
        initPanelState();

        // ── History data ──────────────────────────────────────────────────────
        // Keyed by layer name → { [code]: { nb_pois, nb_siret, … } }
        // Populated asynchronously from history.json
        let historyData = {};

        async function loadHistoryData() {
            try {
                const res = await fetch('https://pub-a4235d6494cb4e47870d52812efcd739.r2.dev/history.json');
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                historyData = await res.json();
            } catch (e) {
                console.warn('Could not load history.json — delta badges will be hidden.', e);
            }
        }

        /**
         * Returns the history snapshot for a given layer + feature code,
         * or null if unavailable.
         */
        function getHistoryEntry(layer, code) {
            const layerHistory = historyData['layers'][layer];
            if (!layerHistory || !code) return null;
            return layerHistory[String(code)] ?? null;
        }

        /**
         * Renders a delta badge: "▲ +3pp" in green or "▼ −2pp" in red.
         * delta is in percentage-points (current% − history%).
         * Returns an HTML string, or '' if delta is 0 / unavailable.
         */
        function deltaBadge(delta) {
            if (delta === null || delta === undefined || isNaN(delta)) return '';
            const trunced = Math.trunc(delta);
            if (trunced === 0) return '<span style="color:#bbb;font-size:10px;">0%</span>';
            const up = trunced > 0;
            const color = up ? '#1a9850' : '#d73027';
            const sign = up ? '+' : '';
            return `<span style="color:${color};font-size:10px;font-weight:600;white-space:nowrap;">${sign}${trunced}%</span>`;
        }

        // ── MapLibre setup ────────────────────────────────────────────────────

        const protocol = new pmtiles.Protocol();
        maplibregl.addProtocol("pmtiles", protocol.tile);

        const COLOR_STOPS = [0, '#d73027', 0.5, '#fee08b', 1, '#1a9850'];

        const LINE_STYLE = {
            boundary: { color: '#555', width: 1, hoverWidth: 3 },
            centroid: { color: '#888', width: 1, hoverWidth: 3 }
        };

        const CIRCLE_RADIUS_RANGES = {
            regions: [6, 4, 12, 50],
            departements: [6, 4, 11, 40],
            epci: [4, 4, 10, 30],
            communes: [2, 5, 9, 30]
        };

        // ── Overpass Turbo helpers ────────────────────────────────────────────

        const OVERPASS_TAG_MAP = {
            nb_siret: ['ref:FR:SIRET'],
            nb_name: ['name'],
            nb_phone: ['phone', 'contact:phone', 'mobile', 'contact:mobile'],
            nb_website_merge: ['website', 'contact:website', 'facebook', 'contact:facebook', 'instagram', 'contact:instagram'],
            nb_email: ['email', 'contact:email'],
            nb_opening_hours: ['opening_hours'],
            nb_wheelchair: ['wheelchair'],
        };

        const OVERPASS_TYPE_FILTERS = [
            ['amenity',
            'bank|bar|boat_rental|bureau_de_change|cafe|camping|car_rental|car_wash|casino|cinema|clinic|coworking_space|dancing_school|dentist|dive_centre|doctors|driver_training|driving_school|fast_food|frozen_food|fuel|funeral_hall|hospital|ice_cream|internet_cafe|kindergarten|language_school|money_transfer|nightclub|nursing_home|personal_service|pharmacy|post_office|pub|restaurant|ski_rental|ski_school|stripclub|studio|theatre|training|vehicle_inspection|veterinary|workshop'.split("|").sort().join("|"),
            'public_bookcase|public_building'],
            ['shop',
            'alcohol|anime|antiques|appliance|baby_goods|bag|bakery|bathroom_furnishing|beauty|bed|beverages|bicycle|boat|books|boutique|butcher|camera|canabis|candles|cannabis|car|car_parts|car_repair|caravan|carpet|cheese|chemist|chocolate|clothes|coffee|computer|confectionery|convenience|copyshop|cosmetics|craft|curtain|dairy|deli|department_store|doityourself|dry_cleaning|e-cigarette|electrical|electronics|erotic|fabric|fashion_accessories|fishing|flooring|florist|food|frame|funeral_directors|furniture|games|garden_centre|garden_furniture|gas|general|gift|gold_buyer|greengrocer|grocery|groundskeeping|hairdresser|hardware|health_food|hearing_aids|herbalist|hifi|household_linen|houseware|interior_decoration|jewelry|kitchen|laundry|leather|lighting|locksmith|mall|massage|medical_supply|mobile_phone|money_lender|motorcycle|motorcycle_repair|music|musical_instrument|newsagent|nutrition_supplements|optician|outdoor|paint|pastry|pawnbroker|perfumery|pet|pet_grooming|photo|pottery|printer_ink|printing|rental|repair|scooter|scuba_diving|seafood|second_hand|security|sewing|shoe_repair|shoes|sports|stationery|storage_rental|supermarket|tailor|tattoo|tea|tobacco|tool_hire|toys|trade|travel_agency|tyres|variety_store|video_games|watches|weapons|wholesale|window_blind|wine'.split("|").sort().join("|"),
            'kiosk|vacant'],
            ['office',
            'accountant|advertising_agency|architect|cleaning|company|construction|construction_company|consulting|coworking|credit_broker|developer|employment_agency|estate_agent|financial|financial_advisor|graphic_design|insurance|it|lawyer|logistics|moving_company|newspaper|notary|property_management|tax_advisor|telecommunication|travel_agent'.split("|").sort().join("|"),
            ''],
            ['craft',
            'agricultural_engines|brewery|builder|cabinet_maker|carpenter|caterer|cleaning|clockmaker|confectionery|distillery|dressmaker|electrician|electronics_repair|gardener|glaziery|handicraft|hvac|insulation|jeweller|joiner|key_cutter|metal_construction|painter|photographer|plumber|pottery|printer|roofer|sawmill|sculptor|shoemaker|stonemason|tailor|tiler|upholsterer|window_construction|winery'.split("|").sort().join("|"),
            ''],
            ['tourism',
            'guest_house|hostel|hotel|motel'.split("|").sort().join("|"),
            ''],
        ];

        function buildOverpassUrl(name, osmRelId, tagKey) {
            const osmTags = OVERPASS_TAG_MAP[tagKey];
            if (!osmTags?.length || !osmRelId) return null;

            // Exclude features that have ANY of the tags for this key
            // e.g. phone → [!"phone"][!"contact:phone"]
            const tagFilter = osmTags.map(t => `[!"${t}"]`).join('');

            const filterLines = OVERPASS_TYPE_FILTERS
                .map(([typeKey, includeValues, excludeValues]) => {
                    const include = `["${typeKey}"~"${includeValues}"]`;
                    const exclude = excludeValues ? `["${typeKey}"!~"${excludeValues}"]` : '';
                    return `nwr${include}${exclude}${tagFilter}(area.territoire);`;
                })
                .join('\n\n');

            const query =
                `//POIs de ${name} sans ${osmTags.map(t => `${t}`).join(', ')}\n
[out:json];
rel(${osmRelId});map_to_area->.territoire;
(
${filterLines}
);
out body;
>;
out skel qt;`;

            return `https://overpass-turbo.eu/?Q=${encodeURIComponent(query)}&R`;
        }

        // ── MapLibre expression helpers ───────────────────────────────────────

        function makeFillColor(tag, missing_values_tag = false) {
            const expression = [
                'case',
                ['==', ['to-number', ['coalesce', ['get', 'nb_pois'], 0]], 0],
                'rgba(0,0,0,0)'
            ];

            if (missing_values_tag) {
                expression.push(
                    ['==', ['to-number', ['coalesce', ['get', tag], 0]], ['to-number', ['coalesce', ['get', 'nb_pois'], 0]]],
                    'rgba(0,0,0,0)'
                );
            }

            expression.push([
                'interpolate', ['linear'],
                [
                    '/',
                    ['to-number', ['coalesce', ['get', tag], 0]],
                    ['max', ['to-number', ['coalesce', ['get', 'nb_pois'], 0]], 1]
                ],
                ...COLOR_STOPS
            ]);

            return expression;
        }

        function makeFreshnessFillColor() {
                // 0 days → green, 180 days → yellow, 365+ days → red
            return [
                'case',
                ['==', ['to-number', ['coalesce', ['get', 'nb_pois'], 0]], 0],
                'rgba(0,0,0,0)',
                [
                    'interpolate', ['linear'],
                    ['to-number', ['coalesce', ['get', 'avg_days_since_pois_update'], 365]],
                    365, '#1a9850',
                    730, '#fee08b',
                    1825, '#d73027'
                ]
            ];
        }

        function makeLineWidth(hoverW, normalW) {
            return ['case', ['boolean', ['feature-state', 'hover'], false], hoverW, normalW];
        }

        function makeCircleRadius(layer, sizeMode, tag) {
            const [lnMin, rMin, lnMax, rMax] = CIRCLE_RADIUS_RANGES[layer];

            const sizeExpr = sizeMode === 'missing'
                ? ['max',
                    ['-',
                        ['to-number', ['coalesce', ['get', 'nb_pois'], 0]],
                        ['to-number', ['coalesce', ['get', tag], 0]]
                    ],
                    0
                ]
                : ['to-number', ['coalesce', ['get', 'nb_pois'], 0]];

            return [
                'interpolate', ['linear'],
                ['ln', ['max', sizeExpr, 1]],
                lnMin, rMin,
                lnMax, rMax
            ];
        }

        const map = new maplibregl.Map({
            container: "map",
            style: {
                version: 8,
                sources: {
                    osm: { type: "raster", tiles: ["https://tile.openstreetmap.org/{z}/{x}/{y}.png"], tileSize: 256 },
                    regions: { type: "vector", url: "pmtiles://https://pub-a4235d6494cb4e47870d52812efcd739.r2.dev/regions_stats.pmtiles", promoteId: 'code' },
                    departements: { type: "vector", url: "pmtiles://https://pub-a4235d6494cb4e47870d52812efcd739.r2.dev/departements_stats.pmtiles", promoteId: 'code' },
                    epci: { type: "vector", url: "pmtiles://https://pub-a4235d6494cb4e47870d52812efcd739.r2.dev/epci_stats.pmtiles", promoteId: 'code' },
                    communes: { type: "vector", url: "pmtiles://https://pub-a4235d6494cb4e47870d52812efcd739.r2.dev/communes_stats.pmtiles", promoteId: 'code' },

                    regions_centroid: { type: "vector", url: "pmtiles://https://pub-a4235d6494cb4e47870d52812efcd739.r2.dev/regions_stats_centroid.pmtiles", promoteId: 'code' },
                    departements_centroid: { type: "vector", url: "pmtiles://https://pub-a4235d6494cb4e47870d52812efcd739.r2.dev/departements_stats_centroid.pmtiles", promoteId: 'code' },
                    epci_centroid: { type: "vector", url: "pmtiles://https://pub-a4235d6494cb4e47870d52812efcd739.r2.dev/epci_stats_centroid.pmtiles", promoteId: 'code' },
                    communes_centroid: { type: "vector", url: "pmtiles://https://pub-a4235d6494cb4e47870d52812efcd739.r2.dev/communes_stats_centroid.pmtiles", promoteId: 'code' },

                    regions_labels: { type: "geojson", data: "https://pub-a4235d6494cb4e47870d52812efcd739.r2.dev/regions_labels.geojson" },
                    departements_labels: { type: "geojson", data: "https://pub-a4235d6494cb4e47870d52812efcd739.r2.dev/departements_labels.geojson" },
                    epci_labels: { type: "geojson", data: "https://pub-a4235d6494cb4e47870d52812efcd739.r2.dev/epci_labels.geojson" },
                    communes_labels: { type: "vector", url: "pmtiles://https://pub-a4235d6494cb4e47870d52812efcd739.r2.dev/communes_labels.pmtiles" }
                },
                layers: [
                    { id: "osm", type: "raster", source: "osm" },

                    // ── Fills ────────────────────────────────────────────────────
                    {
                        id: 'regions-fill', type: 'fill', source: 'regions',
                        'source-layer': 'regions_stats', minzoom: 0,
                        layout: { visibility: 'none' },
                        paint: { 'fill-color': makeFillColor('nb_siret'), 'fill-opacity': 1 }
                    },
                    {
                        id: 'regions-line', type: 'line', source: 'regions',
                        'source-layer': 'regions_stats', minzoom: 0,
                        layout: { visibility: 'none' },
                        paint: {
                            'line-color': LINE_STYLE.boundary.color,
                            'line-width': makeLineWidth(LINE_STYLE.boundary.hoverWidth, LINE_STYLE.boundary.width)
                        }
                    },
                    {

            if (mode === 'boundary') {
                map.setLayoutProperty(layer + '-fill', 'visibility', 'visible');
                map.setLayoutProperty(layer + '-label', 'visibility', 'visible');
            } else {
                map.setLayoutProperty(layer + '-circle', 'visibility', 'visible');
            }

            map.setLayoutProperty(layer + '-line', 'visibility', 'visible');
            applyLineStyle(layer, mode);

        // Color helper matching the map gradient (red → yellow → green)
        function pctColor(pct) {
            if (pct <= 50) {
                // red (#d73027) → yellow (#fee08b)
                const t = pct / 50;
                const r = Math.round(215 + (254 - 215) * t);
                const g = Math.round(48 + (224 - 48) * t);
                const b = Math.round(39 + (139 - 39) * t);
                return `rgb(${r},${g},${b})`;
            } else {
                // yellow (#fee08b) → green (#1a9850)
                const t = (pct - 50) / 50;
                const r = Math.round(254 + (26 - 254) * t);
                const g = Math.round(224 + (152 - 224) * t);
                const b = Math.round(139 + (80 - 139) * t);
                return `rgb(${r},${g},${b})`;
            }
        }

        function formatDuration(days) {
            if (days === 'N/A' || days == null) return 'N/A';

            const d = days; //Math.round(days);
            const years = Math.floor(d / 365);
            const months = Math.floor((d % 365) / (365 / 12));
            const remDays = d % (365 / 12);

            const parts = [];
            if (years > 0) parts.push(`${years >= 3 ? '>' : ''}${years} an${years > 1 ? 's' : ''}`);
            if (months > 0 && years < 3) parts.push(`${months} mois`);
            if (parts.length === 0) parts.push(`${remDays} j`);

            return parts.join(' ');
        }

        function buildHoverHTML(f) {
            const nb_pois = f.nb_pois ?? 0;
            const freshness = f.avg_days_since_pois_update ?? 'N/A';
            const isFreshness = currentTag === '__freshness__';

            let detail = '';
            if (nb_pois > 0) {
                if (isFreshness) {
                    detail = `<br/>Âge moyen maj: <b>${formatDuration(freshness)}</b>`;
                } else {
                    const val = Math.trunc((f[currentTag] ?? 0) / nb_pois * 100);
                    const missing = nb_pois - (f[currentTag] ?? 0);
                    detail = `
                    <br/>Âge moyen maj: ${formatDuration(freshness)}<br/>
                    ${currentLabel}: <b>${val}%</b><br/>
                    POIs sans tag ${currentLabel.replace('Complétude ', '')}: <b>${missing.toLocaleString()}</b>`;
                }
            }

            return `<div style="font-family:sans-serif;font-size:12px;">
            <b>${f.code ?? 'N/A'} - ${f.nom ?? 'N/A'}</b><br/>
            POIs: ${nb_pois.toLocaleString()}${detail}</div>
            ${nb_pois > 0 ? '<div style="color:#aaa;font-size:10px;">Cliquer pour le détail</div>' : ''}`;
        }

        function buildClickHTML(f) {
            const nb_pois = f.nb_pois ?? 0;
            const freshness = f.avg_days_since_pois_update ?? 'N/A';
            const isFreshness = currentTag === '__freshness__';
            const pct = (key) => nb_pois > 0 ? Math.trunc((f[key] ?? 0) / nb_pois * 100) : 0;

            // ── History delta ─────────────────────────────────────────────────
            // Look up the historical snapshot for this feature (layer + code).
            // historyData is keyed by layer name → { [code]: { nb_pois, nb_siret, … } }
            const hist = getHistoryEntry(currentLayer, f.code);

            /**
             * Computes the delta in percentage-points for a given tag key.
             * Returns null if history is unavailable or nb_pois was 0 then.
             */
            function computeDelta(f, key) {
                if (!hist || !hist.nb_pois || hist.nb_pois === 0 || nb_pois === 0) return null;
                const histPct = (hist[key]) / hist.nb_pois * 100;
                const curPct = f[key] / nb_pois * 100;
                return curPct - histPct;
            }

            // Header note: show "vs historique" label only when history exists for this layer
            const hasHistory = !!(historyData['layers'][currentLayer][String(f.code)]);
            const historyLabel = hasHistory
                ? `<span style="color:#aaa;font-size:10px;font-weight:400;margin-left:4px;">et évolution depuis ${new Date(historyData['date']).toLocaleDateString( 'fr-FR', { dateStyle: 'medium' })}</span>`
                : '';

            const poisDelta = hasHistory ? nb_pois - historyData['layers'][currentLayer][String(f.code)].nb_pois
                : null;

            const poisDeltaBadge = poisDelta !== null
                ? (() => {
                    if (poisDelta === 0) return '<span style="color:#bbb;font-size:10px;margin-left:4px;">(+0)</span>';
                    const up = poisDelta > 0;
                    const color = up ? '#1a9850' : '#d73027';
                    const sign = up ? '+' : '';
                    return `<span style="color:${color};font-size:10px;font-weight:600;margin-left:4px;">(${sign}${poisDelta.toLocaleString()})</span>`;
                })()
                : '';

            const rows = ALL_TAGS.map(({ key, label }) => {
                const p = pct(key);
                const color = pctColor(p);
                const delta = computeDelta(f, key);
               const badge = deltaBadge(delta);

                return `<tr>
                <td style="padding:3px 8px 3px 0;color:#555;white-space:nowrap;">${label}</td>
                <td style="padding:3px 0;font-weight:600;color:#222;text-align:right;padding-right:6px;white-space:nowrap;">
                    ${badge}
                </td>
                <td style="padding:3px 0;font-weight:600;color:#222;text-align:right;padding-right:6px;white-space:nowrap;">
                    ${p}%
                </td>
                <td style="padding:3px 0;width:80px;">
                    <div style="background:#eee;border-radius:3px;height:7px;overflow:hidden;">
                        <div style="background:${color};border-radius:3px;height:7px;width:${p}%;transition:width 0.3s;"></div>
                    </div>
                </td>
            </tr>`;
            }).join('');

            let overpassSection = '';
            if (!isFreshness && (currentLayer === 'communes' || currentLayer === 'epci') && f.osm_id && nb_pois > 0) {
                const overpassUrl = buildOverpassUrl(f.nom, f.osm_id, currentTag);
                if (overpassUrl) {
                    overpassSection = `<div>
                    <a href="${overpassUrl}" target="_blank"
                    style="display:inline-flex;align-items:center;gap:5px;
                            color:#1a56db;text-decoration:none;font-size:11px;font-weight:500;">
                        Voir sur Overpass Turbo
                    </a>
                </div>`;
                }
            }

            const missingLine = (!isFreshness && nb_pois > 0)
                ? `<div style="margin-top:10px;padding-top:8px;border-top:1px solid #eee;">POIs sans tag ${currentLabel.replace('Complétude ', '')}: <b>${(nb_pois - (f[currentTag] ?? 0)).toLocaleString()}</b></div>`
                : '';

            const html_if_pois = nb_pois > 0
                ? ` - Âge moyen maj: <b style="color:#111;">${formatDuration(freshness)}</b>
                </div>
                <div style="font-size:10px;color:#aaa;margin-bottom:6px;">% complétude${historyLabel}</div>
                <table style="border-collapse:collapse;width:100%;">${rows}</table>
                ${missingLine}`
                : `</div>`;

            return `<div style="font-family:sans-serif;font-size:12px;min-width:240px;">
            <div style="font-weight:700;font-size:14px;margin-bottom:4px;color:#111;">${f.code ?? 'N/A'} - ${f.nom ?? 'N/A'}</div>
            <div style="margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #eee;color:#555;">
                Total POIs: <b style="color:#111;">${nb_pois.toLocaleString()}</b>${poisDeltaBadge}${html_if_pois}
            ${overpassSection}
        </div>`;
        }

        const hoverPopup = new maplibregl.Popup({ closeButton: false, closeOnClick: false });

        // ── Hover: boundary polygons ──────────────────────────────────────────

        function attachBoundaryHover(fillId) {
            const sourceName = fillId.replace('-fill', '');
            const sourceLayer = sourceName + '_stats';
            let hoveredStateId = null;

            if (!isTouch) {
                map.on('mousemove', fillId, (e) => {
                    if (currentLayer !== sourceName || currentMode !== 'boundary') return;
                    map.getCanvas().style.cursor = 'pointer';
                    hoverPopup.setLngLat(e.lngLat).setHTML(buildHoverHTML(e.features[0].properties)).addTo(map);
                    if (hoveredStateId) {
                        map.setFeatureState({ source: sourceName, sourceLayer, id: hoveredStateId }, { hover: false });
                    }
                    hoveredStateId = e.features[0].id;
                    map.setFeatureState({ source: sourceName, sourceLayer, id: hoveredStateId }, { hover: true });
                });

                map.on('mouseleave', fillId, () => {
                    map.getCanvas().style.cursor = '';
                    hoverPopup.remove();
                    if (hoveredStateId) {
                        map.setFeatureState({ source: sourceName, sourceLayer, id: hoveredStateId }, { hover: false });
                    }
                    hoveredStateId = null;
                });
            }

            map.on('click', fillId, (e) => {
                if (currentLayer !== sourceName || currentMode !== 'boundary') return;
                clickPopup.setLngLat(e.lngLat).setHTML(buildClickHTML(e.features[0].properties)).addTo(map);
            });
        }

        // ── Hover: centroid circles ───────────────────────────────────────────

        function attachCentroidHover(circleId) {
            const sourceName = circleId.replace('-circle', '');
            const sourceLayer = sourceName + '_stats_centroid';
            let hoveredCentroidId = null;

            if (!isTouch) {
                map.on('mousemove', circleId, (e) => {
                    if (currentLayer !== sourceName || currentMode !== 'centroid') return;
                    map.getCanvas().style.cursor = 'pointer';
                    hoverPopup.setLngLat(e.lngLat).setHTML(buildHoverHTML(e.features[0].properties)).addTo(map);

                    if (hoveredCentroidId !== null) {
                        map.setFeatureState(
                            { source: sourceName + '_centroid', sourceLayer, id: hoveredCentroidId },
                            { hover: false }
                        );
                    }
                    hoveredCentroidId = e.features[0].id;
                    map.setFeatureState(
                        { source: sourceName + '_centroid', sourceLayer, id: hoveredCentroidId },
                        { hover: true }
                    );
                });

                map.on('mouseleave', circleId, () => {
                    if (currentMode !== 'centroid') return;
                    map.getCanvas().style.cursor = '';
                    hoverPopup.remove();
                    if (hoveredCentroidId !== null) {
                        map.setFeatureState(
                            { source: sourceName + '_centroid', sourceLayer, id: hoveredCentroidId },
                            { hover: false }
                        );
                    }
                    hoveredCentroidId = null;
                });
            }

            map.on('click', circleId, (e) => {
                if (currentLayer !== sourceName || currentMode !== 'centroid') return;
                clickPopup.setLngLat(e.lngLat).setHTML(buildClickHTML(e.features[0].properties)).addTo(map);
            });
        }


        // ── Init ──────────────────────────────────────────────────────────────

        map.on('load', () => {
            attachBoundaryHover('regions-fill');
            attachBoundaryHover('departements-fill');
            attachBoundaryHover('epci-fill');
            attachBoundaryHover('communes-fill');

            attachCentroidHover('regions-circle');
            attachCentroidHover('departements-circle');
            attachCentroidHover('epci-circle');
            attachCentroidHover('communes-circle');

            document.querySelector('.layer-btn.active')?.click();
            document.querySelector('.mode-btn.active')?.click();
            document.querySelector('.circle-size-btn.active')?.click();
            document.querySelector('.tag-btn.active')?.click();
        });

        map.on('moveend', () => {
            const { lng, lat } = map.getCenter();
            localStorage.setItem('osm_zoom', map.getZoom());
            localStorage.setItem('osm_lng', lng);
            localStorage.setItem('osm_lat', lat);
        });

        async function loadUpdateTimestamp() {
            try {
                const res = await fetch('https://pub-a4235d6494cb4e47870d52812efcd739.r2.dev/update_timestamp.json');
                const { updated_at } = await res.json();
                document.getElementById('update-time').innerHTML = `
        <span style="color:#666;font-size:11px;">
            Mise à jour des données OSM: <br><b>${new Date(updated_at).toLocaleString('fr-FR', {
                    dateStyle: 'medium', timeStyle: 'short'
                })}</b>
        </span>`;
            } catch (e) {
                console.warn('Could not read update timestamp', e);
            }
        }

        loadUpdateTimestamp();
        loadHistoryData(); // ← load history snapshot on startup
    </script>
</body>
