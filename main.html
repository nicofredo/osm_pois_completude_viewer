<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Complétude POIs OSM</title>
    <link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>
    <script src="https://unpkg.com/pmtiles@latest/dist/pmtiles.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: sans-serif;
        }

        #map {
            width: 100%;
            height: 100dvh;
        }

        /* ── Controls panel ─────────────────────────────────────── */

        #controls {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            padding: 12px 16px;
            width: 260px;
            max-height: calc(100vh - 80px);
            overflow-y: auto;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        /* Collapsed state on mobile */
        #controls.collapsed {
            transform: translateX(calc(-100% - 20px));
            opacity: 0;
            pointer-events: none;
        }

        /* Mobile toggle button */
        #toggle-controls {
            display: none;
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 11;
            background: white;
            border: none;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            padding: 10px 12px;
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            color: #444;
        }

        #toggle-controls:hover {
            background: #f0f0f0;
        }

        /* Mobile backdrop */
        #controls-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9;
            background: rgba(0, 0, 0, 0.25);
        }

        h2 {
            color: #000;
            text-align: center;
            font-size: 13px;
            margin: 0 0 10px;
            line-height: 1.4;
        }

        #source-code {
            font-size: 11px;
        }

        .section-label {
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #888;
            margin: 0 0 6px;
        }

        .divider {
            border: none;
            border-top: 1px solid #eee;
            margin: 10px 0;
        }

        .toggle-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 0;
        }

        .layer-btn {
            flex: 1;
            padding: 7px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            font-size: 12px;
            color: #444;
            text-align: center;
        }

        .layer-btn:hover {
            background: #f0f0f0;
        }

        .layer-btn.active {
            background: #e8f0fe;
            border-color: #4285f4;
            color: #1a56db;
            font-weight: 500;
        }

        .mode-row {
            display: flex;
            flex-direction: row;
            gap: 6px;
            margin-bottom: 0;
        }

        .mode-btn {
            flex: 1;
            padding: 7px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            font-size: 12px;
            color: #444;
            text-align: center;
        }

        .mode-btn:hover {
            background: #f0f0f0;
        }

        .mode-btn.active {
            background: #e8f0fe;
            border-color: #4285f4;
            color: #1a56db;
            font-weight: 500;
        }

        .tag-btn {
            display: block;
            width: 100%;
            text-align: left;
            padding: 7px 10px;
            margin-bottom: 4px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            font-size: 12px;
            color: #444;
        }

        .tag-btn:hover {
            background: #f0f0f0;
        }

        .tag-btn.active {
            background: #e8f0fe;
            border-color: #4285f4;
            color: #1a56db;
            font-weight: 500;
        }

        #circle-size-section {
            display: none;
        }

        .circle-size-row {
            display: flex;
            flex-direction: row;
            gap: 6px;
            margin-bottom: 0;
        }

        .circle-size-btn {
            flex: 1;
            padding: 7px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            font-size: 12px;
            color: #444;
            text-align: center;
        }

        .circle-size-btn:hover {
            background: #f0f0f0;
        }

        .circle-size-btn.active {
            background: #e8f0fe;
            border-color: #4285f4;
            color: #1a56db;
            font-weight: 500;
        }

        /* ── Legend ─────────────────────────────────────────────── */

        #legend {
            position: absolute;
            bottom: 10px;
            left: 10px;
            z-index: 10;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            padding: 10px 14px;
            font-size: 12px;
        }

        #legend-bar {
            width: 160px;
            height: 10px;
            border-radius: 4px;
            background: linear-gradient(to right, #d73027, #fee08b, #1a9850);
            margin-bottom: 4px;
        }

        #legend-labels {
            display: flex;
            justify-content: space-between;
            color: #666;
        }

        /* ── Popup ──────────────────────────────────────────────── */

        .maplibregl-popup-close-button {
            font-size: 16px;
            color: #888;
            padding: 4px 8px;
        }

        .maplibregl-popup-close-button:hover {
            color: #333;
            background: transparent;
        }

        /* ── Mobile breakpoint ──────────────────────────────────── */

        @media (max-width: 600px) {

            /* Show the toggle button */
            #toggle-controls {
                display: block;
            }

            /* Panel slides in from left, full-width-ish */
            #controls {
                top: 0;
                left: 0;
                border-radius: 0 8px 8px 0;
                width: min(280px, 88vw);
                max-height: 100vh;
                padding-top: 16px;
                padding-bottom: 16px;
            }

            /* When open, show backdrop */
            #controls:not(.collapsed)~#controls-backdrop {
                display: block;
            }

            /* Legend moves up a touch on mobile so it clears the map controls */
            #legend {
                bottom: 10px;
                left: 10px;
            }

            /* Popups shouldn't overflow screen */
            .maplibregl-popup-content {
                max-width: 85vw !important;
            }
        }

        /* ── Tablet: slightly narrower panel ────────────────────── */

        @media (min-width: 601px) and (max-width: 900px) {
            #controls {
                width: 230px;
            }
        }
    </style>
</head>

<body>
    <div id="map">
        <!-- Mobile hamburger toggle -->
        <button id="toggle-controls" aria-label="Ouvrir le panneau de contrôle">☰</button>
        
        <!-- Click-outside backdrop (mobile only) -->
        <div id="controls-backdrop"></div>
        
        <div id="controls">
            <h2>Complétude des POIs OSM par territoire</h2>
        
            <p class="section-label">Couche</p>
            <div class="toggle-row">
                <button class="layer-btn" data-layer="regions">Régions</button>
                <button class="layer-btn" data-layer="departements">Départements</button>
                <button class="layer-btn" data-layer="epci">EPCI</button>
                <button class="layer-btn" data-layer="communes">Communes</button>
            </div>
        
            <hr class="divider" />
        
            <p class="section-label">Mode d'affichage</p>
            <div class="mode-row">
                <button class="mode-btn" data-mode="boundary">Boundaries</button>
                <button class="mode-btn" data-mode="centroid">Cercles</button>
            </div>
        
            <div id="circle-size-section">
                <hr class="divider" />
                <p class="section-label">Taille des cercles</p>
                <div class="mode-row">
                    <button class="circle-size-btn" data-circle-size="total"
                        title="Taille proportionnelle au nombre total de POIs">Total POIs</button>
                    <button class="circle-size-btn" data-circle-size="missing"
                        title="Taille proportionnelle aux POIs sans le tag sélectionné">POIs sans le tag</button>
                </div>
            </div>
        
            <hr class="divider" />

            <p class="section-label">Temps moyen depuis maj POIs</p>
            <button class="tag-btn" data-tag="__freshness__" data-label="Fraîcheur des POIs">Fraîcheur moyenne</button>
            <hr class="divider" />
        
            <p class="section-label">Tags</p>
            <button class="tag-btn" data-tag="nb_siret" data-label="Complétude SIRET" title="Tag ref:FR:SIRET">SIRET</button>
            <button class="tag-btn" data-tag="nb_name" data-label="Complétude Name" title="Tag name">Name</button>
            <button class="tag-btn" data-tag="nb_phone" data-label="Complétude Phone"
                title="Tags phone, contact:phone">Phone</button>
            <button class="tag-btn" data-tag="nb_website_merge" data-label="Complétude Website, Fb, Insta"
                title="Tags website, contact:website, facebook, contact:facebook, instagram, contact:instagram">Website |
                Facebook | Instagram</button>
            <button class="tag-btn" data-tag="nb_email" data-label="Complétude Email"
                title="Tags email, contact:email">Email</button>
            <button class="tag-btn" data-tag="nb_opening_hours" data-label="Complétude Opening hours"
                title="Tag opening_hours">Opening hours</button>
            <button class="tag-btn" data-tag="nb_wheelchair" data-label="Complétude Wheelchair"
                title="Tag wheelchair">Wheelchair</button>
            <br>
            <div id="update-time"></div>
            <a href="https://github.com/nicofredo/osm_pois_completude_viewer" target="_blank" id="source-code">Code
                source</a>
        </div>
        
        <div id="legend">
            <div id="legend-bar"></div>
            <div id="legend-labels"><span>0%</span><span>50%</span><span>100%</span></div>
        </div>
    </div>


    <script>
        // ── Mobile panel toggle ───────────────────────────────────────────────

        const controlsPanel = document.getElementById('controls');
        const toggleBtn = document.getElementById('toggle-controls');
        const backdrop = document.getElementById('controls-backdrop');

        const isTouch = window.matchMedia('(hover: none)').matches;

        function isMobile() { return window.innerWidth <= 600; }

        function openPanel() {
            controlsPanel.classList.remove('collapsed');
            toggleBtn.textContent = '✕';
            backdrop.style.display = 'block';
        }

        function closePanel() {
            controlsPanel.classList.add('collapsed');
            toggleBtn.textContent = '☰';
            backdrop.style.display = 'none';
        }

        function initPanelState() {
            if (isMobile()) {
                closePanel();
            } else {
                controlsPanel.classList.remove('collapsed');
                backdrop.style.display = 'none';
            }
        }

        toggleBtn.addEventListener('click', () => {
            if (controlsPanel.classList.contains('collapsed')) {
                openPanel();
            } else {
                closePanel();
            }
        });

        backdrop.addEventListener('click', closePanel);

        document.querySelectorAll('.tag-btn, .layer-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (isMobile()) closePanel();
            });
        });

        window.addEventListener('resize', initPanelState);
        initPanelState();

        // ── MapLibre setup ────────────────────────────────────────────────────

        const protocol = new pmtiles.Protocol();
        maplibregl.addProtocol("pmtiles", protocol.tile);

        const COLOR_STOPS = [0, '#d73027', 0.5, '#fee08b', 1, '#1a9850'];

        const LINE_STYLE = {
            boundary: { color: '#555', width: 1, hoverWidth: 3 },
            centroid: { color: '#888', width: 1, hoverWidth: 3 }
        };

        const CIRCLE_RADIUS_RANGES = {
            regions: [6, 4, 12, 50],
            departements: [6, 4, 11, 40],
            epci: [4, 4, 10, 30],
            communes: [2, 5, 9, 30]
        };

        // ── Overpass Turbo helpers ────────────────────────────────────────────

        // Maps nb_* property keys → array of OSM tags that count as "present"
        // The Overpass filter will exclude features that have ANY of these tags.
        const OVERPASS_TAG_MAP = {
            nb_siret: ['ref:FR:SIRET'],
            nb_name: ['name'],
            nb_phone: ['phone', 'contact:phone'],
            nb_website_merge: ['website', 'contact:website', 'facebook', 'contact:facebook', 'instagram', 'contact:instagram'],
            nb_email: ['email', 'contact:email'],
            nb_opening_hours: ['opening_hours'],
            nb_wheelchair: ['wheelchair'],
        };

        // POI type filters shared across all Overpass queries (same list as the reference URL)
        const OVERPASS_TYPE_FILTERS = [
            ['amenity',
                'restaurant|fast_food|cafe|fuel|pharmacy|bank|bar|hospital|post_office|clinic|pub|car_wash|ice_cream|driving_school|cinema|car_rental|nightclub|bureau_de_change|studio|internet_cafe|money_transfer|casino|vehicle_inspection|frozen_food|boat_rental|coworking_space|workshop|personal_service|camping|dancing_school|training|ski_school|ski_rental|dive_centre|driver_training|nursing_home|funeral_hall|doctors|dentist|theatre|kindergarten|language_school|stripclub|veterinary'.split("|").sort().join("|"),
                'public_bookcase|public_building',
                ''],
            ['shop',
                'convenience|supermarket|clothes|hairdresser|car_repair|bakery|beauty|car|hardware|mobile_phone|butcher|furniture|car_parts|alcohol|florist|scooter|variety_store|electronics|shoes|optician|jewelry|mall|gift|doityourself|greengrocer|books|bicycle|chemist|department_store|laundry|travel_agency|stationery|pet|sports|confectionery|tyres|cosmetics|computer|tailor|tobacco|storage_rental|dry_cleaning|trade|copyshop|motorcycle|funeral_directors|beverages|newsagent|garden_centre|massage|pastry|interior_decoration|general|deli|toys|houseware|wine|seafood|pawnbroker|tattoo|paint|wholesale|photo|second_hand|bed|kitchen|outdoor|fabric|antiques|coffee|gas|e-cigarette|perfumery|craft|hearing_aids|money_lender|appliance|electrical|tea|motorcycle_repair|boutique|baby_goods|bag|musical_instrument|dairy|pet_grooming|music|carpet|rental|fashion_accessories|cheese|canabis|chocolate|medical_supply|leather|sewing|cannabis|locksmith|games|video_games|hifi|window_blind|caravan|tool_hire|household_linen|bathroom_furnishing|shoe_repair|watches|nutrition_supplements|fishing|erotic|frame|grocery|boat|repair|weapons|gold_buyer|lighting|pottery|security|groundskeeping|herbalist|curtain|health_food|flooring|printer_ink|anime|camera|scuba_diving|candles|printing|garden_furniture|food'.split("|").sort().join("|"),
                'kiosk|vacant'],
            ['office',
                'company|estate_agent|insurance|telecommunication|it|accountant|employment_agency|tax_advisor|financial|advertising_agency|logistics|newspaper|financial_advisor|consulting|travel_agent|coworking|moving_company|lawyer|architect|construction_company|developer|credit_broker|graphic_design|construction|property_management|cleaning|notary'.split("|").sort().join("|"),
                ''],
            ['craft',
                'carpenter|winery|metal_construction|electronics_repair|photographer|electrician|brewery|hvac|plumber|tailor|shoemaker|sawmill|caterer|window_construction|gardener|dressmaker|confectionery|stonemason|glaziery|painter|roofer|builder|key_cutter|upholsterer|cleaning|pottery|distillery|jeweller|handicraft|joiner|agricultural_engines|tiler|insulation|clockmaker|sculptor|printer|cabinet_maker'.split("|").sort().join("|"),
                ''],
            ['tourism',
                'hotel|hostel|guest_house|motel'.split("|").sort().join("|"),
                ''],
        ];

        /**
         * Builds an Overpass Turbo URL showing POIs inside a commune
         * that are missing ALL of the tags associated with the selected key.
         *
         * @param {number|string} osmRelId - OSM relation ID of the commune (from osm_id property)
         * @param {string}        tagKey   - nb_* property key (e.g. 'nb_siret')
         * @returns {string|null} Full Overpass Turbo URL, or null if inputs are invalid
         */
        function buildOverpassUrl(name, osmRelId, tagKey) {
            const osmTags = OVERPASS_TAG_MAP[tagKey];
            if (!osmTags?.length || !osmRelId) return null;

            // Exclude features that have ANY of the tags for this key
            // e.g. phone → [!"phone"][!"contact:phone"]
            const tagFilter = osmTags.map(t => `[!"${t}"]`).join('');

            const filterLines = OVERPASS_TYPE_FILTERS
                .map(([typeKey, includeValues, excludeValues]) => {
                    const include = `["${typeKey}"~"${includeValues}"]`;
                    const exclude = excludeValues
                        ? `["${typeKey}"!~"${excludeValues}"]`
                        : '';
                    return `nwr${include}${exclude}${tagFilter}(area.territoire);`;
                })
                .join('\n\n');

            const query =
                `//POIs de ${name} sans ${osmTags.map(t => `${t}`).join(', ')}\n
[out:json];
rel(${osmRelId});map_to_area->.territoire;
(
${filterLines}
);
out body;
>;
out skel qt;`;

            return `https://overpass-turbo.eu/?Q=${encodeURIComponent(query)}&R`;
        }

        // ── MapLibre expression helpers ───────────────────────────────────────

        function makeFillColor(tag, missing_values_tag = false) {
            const expression = [
                'case',
                ['==', ['to-number', ['coalesce', ['get', 'nb_pois'], 0]], 0],
                'rgba(0,0,0,0)'
            ];

            if (missing_values_tag) {
                expression.push(
                    ['==', ['to-number', ['coalesce', ['get', tag], 0]], ['to-number', ['coalesce', ['get', 'nb_pois'], 0]]],
                    'rgba(0,0,0,0)'
                );
            }

            expression.push([
                'interpolate', ['linear'],
                [
                    '/',
                    ['to-number', ['coalesce', ['get', tag], 0]],
                    ['max', ['to-number', ['coalesce', ['get', 'nb_pois'], 0]], 1]  // ← prevent 0/0
                ],
                ...COLOR_STOPS
            ]);

            return expression;
        }

        function makeFreshnessFillColor() {
                // 0 days → green, 180 days → yellow, 365+ days → red
                return [
                    'case',
                    ['==', ['to-number', ['coalesce', ['get', 'nb_pois'], 0]], 0],
                    'rgba(0,0,0,0)',
                    [
                        'interpolate', ['linear'],
                        ['to-number', ['coalesce', ['get', 'avg_days_since_pois_update'], 365]],
                        365, '#1a9850',
                        730, '#fee08b',
                        1825, '#d73027'
                    ]
                ];
            }

        function makeLineWidth(hoverW, normalW) {
            return ['case', ['boolean', ['feature-state', 'hover'], false], hoverW, normalW];
        }

        function makeCircleRadius(layer, sizeMode, tag) {
            const [lnMin, rMin, lnMax, rMax] = CIRCLE_RADIUS_RANGES[layer];

            const sizeExpr = sizeMode === 'missing'
                ? ['max',
                    ['-',
                        ['to-number', ['coalesce', ['get', 'nb_pois'], 0]],
                        ['to-number', ['coalesce', ['get', tag], 0]]
                    ],
                    0
                ]
                : ['to-number', ['coalesce', ['get', 'nb_pois'], 0]];

            return [
                'interpolate', ['linear'],
                ['ln', ['max', sizeExpr, 1]],
                lnMin, rMin,
                lnMax, rMax
            ];
        }

        const map = new maplibregl.Map({
            container: "map",
            style: {
                version: 8,
                sources: {
                    osm: { type: "raster", tiles: ["https://tile.openstreetmap.org/{z}/{x}/{y}.png"], tileSize: 256 },
                    regions: { type: "vector", url: "pmtiles://regions.pmtiles", promoteId: 'code' },
                    departements: { type: "vector", url: "pmtiles://departements.pmtiles", promoteId: 'code' },
                    epci: { type: "vector", url: "pmtiles://epci.pmtiles", promoteId: 'code' },
                    communes: { type: "vector", url: "pmtiles://communes.pmtiles", promoteId: 'code' },

                    regions_centroid: { type: "vector", url: "pmtiles://regions_centroid.pmtiles", promoteId: 'code' },
                    departements_centroid: { type: "vector", url: "pmtiles://departements_centroid.pmtiles", promoteId: 'code' },
                    epci_centroid: { type: "vector", url: "pmtiles://epci_centroid.pmtiles", promoteId: 'code' },
                    communes_centroid: { type: "vector", url: "pmtiles://communes_centroid.pmtiles", promoteId: 'code' },

                    regions_labels: { type: "geojson", data: "regions_labels.geojson" },
                    departements_labels: { type: "geojson", data: "departements_labels.geojson" },
                    epci_labels: { type: "geojson", data: "epci_labels.geojson" },
                    communes_labels: { type: "vector", url: "pmtiles://communes_labels.pmtiles" }
                },
                layers: [
                    { id: "osm", type: "raster", source: "osm" },

                    // ── Fills ────────────────────────────────────────────────────
                    {
                        id: 'regions-fill', type: 'fill', source: 'regions',
                        'source-layer': 'regions_stats', minzoom: 0,
                        layout: { visibility: 'none' },
                        paint: { 'fill-color': makeFillColor('nb_siret'), 'fill-opacity': 1 }
                    },
                    {
                        id: 'regions-line', type: 'line', source: 'regions',
                        'source-layer': 'regions_stats', minzoom: 0,
                        layout: { visibility: 'none' },
                        paint: {
                            'line-color': LINE_STYLE.boundary.color,
                            'line-width': makeLineWidth(LINE_STYLE.boundary.hoverWidth, LINE_STYLE.boundary.width)
                        }
                    },
                    {
                        id: 'departements-fill', type: 'fill', source: 'departements',
                        'source-layer': 'departements_stats', minzoom: 2,
                        layout: { visibility: 'none' },
                        paint: { 'fill-color': makeFillColor('nb_siret'), 'fill-opacity': 1 }
                    },
                    {
                        id: 'departements-line', type: 'line', source: 'departements',
                        'source-layer': 'departements_stats', minzoom: 2,
                        layout: { visibility: 'none' },
                        paint: {
                            'line-color': LINE_STYLE.boundary.color,
                            'line-width': makeLineWidth(LINE_STYLE.boundary.hoverWidth, LINE_STYLE.boundary.width)
                        }
                    },
                    {
                        id: 'epci-fill', type: 'fill', source: 'epci',
                        'source-layer': 'epci_stats', minzoom: 3,
                        layout: { visibility: 'none' },
                        paint: { 'fill-color': makeFillColor('nb_siret'), 'fill-opacity': 1 }
                    },
                    {
                        id: 'epci-line', type: 'line', source: 'epci',
                        'source-layer': 'epci_stats', minzoom: 3,
                        layout: { visibility: 'none' },
                        paint: {
                            'line-color': LINE_STYLE.boundary.color,
                            'line-width': makeLineWidth(LINE_STYLE.boundary.hoverWidth, LINE_STYLE.boundary.width)
                        }
                    },
                    {
                        id: 'communes-fill', type: 'fill', source: 'communes',
                        'source-layer': 'communes_stats', minzoom: 5,
                        layout: { visibility: 'none' },
                        paint: { 'fill-color': makeFillColor('nb_siret'), 'fill-opacity': 1 }
                    },
                    {
                        id: 'communes-line', type: 'line', source: 'communes',
                        'source-layer': 'communes_stats', minzoom: 5,
                        layout: { visibility: 'none' },
                        paint: {
                            'line-color': LINE_STYLE.boundary.color,
                            'line-width': makeLineWidth(LINE_STYLE.boundary.hoverWidth, LINE_STYLE.boundary.width)
                        }
                    },

                    // ── Centroid circles ─────────────────────────────────────────
                    {
                        id: 'regions-circle', type: 'circle', source: 'regions_centroid',
                        'source-layer': 'regions_stats_centroid', minzoom: 0,
                        layout: { visibility: 'none' },
                        paint: {
                            'circle-color': makeFillColor('nb_siret'),
                            'circle-radius': makeCircleRadius('regions', 'total', 'nb_siret'),
                            'circle-opacity': 0.85,
                            'circle-stroke-color': LINE_STYLE.centroid.color,
                            'circle-stroke-width': makeLineWidth(LINE_STYLE.centroid.hoverWidth, LINE_STYLE.centroid.width)
                        }
                    },
                    {
                        id: 'departements-circle', type: 'circle', source: 'departements_centroid',
                        'source-layer': 'departements_stats_centroid', minzoom: 2,
                        layout: { visibility: 'none' },
                        paint: {
                            'circle-color': makeFillColor('nb_siret'),
                            'circle-radius': makeCircleRadius('departements', 'total', 'nb_siret'),
                            'circle-opacity': 0.85,
                            'circle-stroke-color': LINE_STYLE.centroid.color,
                            'circle-stroke-width': makeLineWidth(LINE_STYLE.centroid.hoverWidth, LINE_STYLE.centroid.width)
                        }
                    },
                    {
                        id: 'epci-circle', type: 'circle', source: 'epci_centroid',
                        'source-layer': 'epci_stats_centroid', minzoom: 3,
                        layout: { visibility: 'none' },
                        paint: {
                            'circle-color': makeFillColor('nb_siret'),
                            'circle-radius': makeCircleRadius('epci', 'total', 'nb_siret'),
                            'circle-opacity': 0.85,
                            'circle-stroke-color': LINE_STYLE.centroid.color,
                            'circle-stroke-width': makeLineWidth(LINE_STYLE.centroid.hoverWidth, LINE_STYLE.centroid.width)
                        }
                    },
                    {
                        id: 'communes-circle', type: 'circle', source: 'communes_centroid',
                        'source-layer': 'communes_stats_centroid', minzoom: 5,
                        layout: { visibility: 'none' },
                        paint: {
                            'circle-color': makeFillColor('nb_siret'),
                            'circle-radius': makeCircleRadius('communes', 'total', 'nb_siret'),
                            'circle-opacity': 0.85,
                            'circle-stroke-color': LINE_STYLE.centroid.color,
                            'circle-stroke-width': makeLineWidth(LINE_STYLE.centroid.hoverWidth, LINE_STYLE.centroid.width)
                        }
                    },

                    // ── Labels ───────────────────────────────────────────────────
                    {
                        id: 'regions-label', type: 'symbol', source: 'regions_labels',
                        minzoom: 6,
                        layout: {
                            'visibility': 'none', 'text-field': ['get', 'nom'],
                            'text-font': ['Open Sans Regular'], 'text-size': 17,
                            'text-anchor': 'center', 'text-allow-overlap': false, 'text-ignore-placement': false
                        },
                        paint: { 'text-color': '#111', 'text-halo-color': '#fff', 'text-halo-width': 1 }
                    },
                    {
                        id: 'departements-label', type: 'symbol', source: 'departements_labels',
                        minzoom: 6,
                        layout: {
                            'visibility': 'none', 'text-field': ['get', 'nom'],
                            'text-font': ['Open Sans Regular'], 'text-size': 13,
                            'text-anchor': 'center', 'text-allow-overlap': false, 'text-ignore-placement': false
                        },
                        paint: { 'text-color': '#111', 'text-halo-color': '#fff', 'text-halo-width': 1 }
                    },
                    {
                        id: 'epci-label', type: 'symbol', source: 'epci_labels',
                        minzoom: 8,
                        layout: {
                            visibility: 'none', 'text-field': ['get', 'nom'],
                            'text-font': ['Open Sans Regular'], 'text-size': 13,
                            'text-anchor': 'center', 'text-allow-overlap': false, 'text-ignore-placement': false
                        },
                        paint: { 'text-color': '#111', 'text-halo-color': '#fff', 'text-halo-width': 1 }
                    },
                    {
                        id: 'communes-label', type: 'symbol', source: 'communes_labels',
                        'source-layer': 'communes_labels', minzoom: 9,
                        layout: {
                            'visibility': 'none', 'text-field': ['get', 'nom'],
                            'text-font': ['Open Sans Regular'], 'text-size': 13,
                            'text-anchor': 'center', 'text-allow-overlap': false, 'text-ignore-placement': false
                        },
                        paint: { 'text-color': '#111', 'text-halo-color': '#fff', 'text-halo-width': 1 }
                    },

                ]
            },
            center: [
                parseFloat(localStorage.getItem('osm_lng')) || 2.5,
                parseFloat(localStorage.getItem('osm_lat')) || 46.5
            ],
            maxZoom: 13,
            zoom: parseFloat(localStorage.getItem('osm_zoom')) || 5,
            attributionControl: false
        })
            .addControl(new maplibregl.AttributionControl({
                compact: true,
                customAttribution: [
                    '<a href="https://maplibre.org/" target="_blank">MapLibre</a>',
                    '<a href="https://www.openstreetmap.org/copyright" target="_blank">OpenStreetMap</a>'
                ]
            }))
            .addControl(new maplibregl.NavigationControl({ visualizePitch: 'true' }), 'top-right')
            .addControl(new maplibregl.ScaleControl({ unit: 'metric' }), 'bottom-right')
            .addControl(new maplibregl.GlobeControl(), 'top-right')
            .addControl(new maplibregl.FullscreenControl())
            .addControl(new maplibregl.GeolocateControl({ trackUserLocation: 'true' }));

        let currentLayer = localStorage.getItem('osm_layer') ?? 'epci';
        let currentTag = localStorage.getItem('osm_tag') ?? 'nb_siret';
        let currentLabel = document.querySelector(`.tag-btn[data-tag="${currentTag}"]`)?.dataset.label;
        let currentMode = localStorage.getItem('osm_mode') ?? 'boundary';
        let currentCircleSize = localStorage.getItem('osm_circleSize') ?? 'total';

        function syncButtonsToState() {
            document.querySelectorAll('.layer-btn').forEach(b =>
                b.classList.toggle('active', b.dataset.layer === currentLayer));
            document.querySelectorAll('.tag-btn').forEach(b =>
                b.classList.toggle('active', b.dataset.tag === currentTag));
            document.querySelectorAll('.mode-btn').forEach(b =>
                b.classList.toggle('active', b.dataset.mode === currentMode));
            document.querySelectorAll('.circle-size-btn').forEach(b =>
                b.classList.toggle('active', b.dataset.circleSize === currentCircleSize));
        }

        syncButtonsToState();

        // ── Apply line paint for a layer according to current mode ────────────

        function applyLineStyle(layer, mode) {
            const s = LINE_STYLE[mode];
            map.setPaintProperty(layer + '-line', 'line-color', s.color);
            map.setPaintProperty(layer + '-line', 'line-width', makeLineWidth(s.hoverWidth, s.width));
        }

        // ── Visibility + line style ───────────────────────────────────────────

        function setLayerVisibility(layer, mode) {
            ['fill', 'line', 'circle', 'label'].forEach(t => {
                map.setLayoutProperty(layer + '-' + t, 'visibility', 'none');
            });

            if (mode === 'boundary') {
                map.setLayoutProperty(layer + '-fill', 'visibility', 'visible');
                map.setLayoutProperty(layer + '-label', 'visibility', 'visible');
            } else {
                map.setLayoutProperty(layer + '-circle', 'visibility', 'visible');
            }

            map.setLayoutProperty(layer + '-line', 'visibility', 'visible');
            applyLineStyle(layer, mode);
        }

        function switchLayer(layer) {
            localStorage.setItem('osm_layer', layer);
            ['fill', 'line', 'circle', 'label'].forEach(t => {
                map.setLayoutProperty(currentLayer + '-' + t, 'visibility', 'none');
            });
            currentLayer = layer;
            setLayerVisibility(layer, currentMode);
        }

        function switchMode(mode) {
            localStorage.setItem('osm_mode', mode);
            currentMode = mode;
            setLayerVisibility(currentLayer, mode);
            document.getElementById('circle-size-section').style.display =
                (mode === 'centroid' && currentTag !== '__freshness__') ? 'block' : 'none';
        }

        function switchTag(tag, label) {
            localStorage.setItem('osm_tag', tag);
            currentTag = tag;
            currentLabel = label;

            const isFreshness = tag === '__freshness__';
            const fillExpr = isFreshness ? makeFreshnessFillColor() : makeFillColor(tag);
            const circleExpr = isFreshness ? makeFreshnessFillColor()
                : makeFillColor(tag, currentCircleSize === 'missing');


            ['regions', 'departements', 'epci', 'communes'].forEach(l => {
                map.setPaintProperty(l + '-fill', 'fill-color', fillExpr);
                map.setPaintProperty(l + '-circle', 'circle-color', circleExpr);

                if (!isFreshness && currentCircleSize === 'missing') {
                    map.setPaintProperty(l + '-circle', 'circle-radius', makeCircleRadius(l, 'missing', tag));
                }
            });

            if (isFreshness) {
                document.getElementById('legend-bar').style.background =
                    'linear-gradient(to right, #1a9850, #fee08b, #d73027)';
                document.querySelectorAll('#legend-labels span')[0].textContent = '≤1 an';
                document.querySelectorAll('#legend-labels span')[1].textContent = '2 ans';
                document.querySelectorAll('#legend-labels span')[2].textContent = '≥5 ans';
            } else {
                document.getElementById('legend-bar').style.background =
                    'linear-gradient(to right, #d73027, #fee08b, #1a9850)';
                document.querySelectorAll('#legend-labels span')[0].textContent = '0%';
                document.querySelectorAll('#legend-labels span')[1].textContent = '50%';
                document.querySelectorAll('#legend-labels span')[2].textContent = '100%';
            }

            if (isFreshness) {
                currentCircleSize = 'total';
                document.querySelectorAll('.circle-size-btn').forEach(b =>
                    b.classList.toggle('active', b.dataset.circleSize === 'total'));
                ['regions', 'departements', 'epci', 'communes'].forEach(l =>
                    map.setPaintProperty(l + '-circle', 'circle-radius', makeCircleRadius(l, 'total', tag)));
            }

            document.getElementById('circle-size-section').style.display =
                (currentMode === 'centroid' && !isFreshness) ? 'block' : 'none';
        }

        function applyCircleRadius() {
            ['regions', 'departements', 'epci', 'communes'].forEach(l => {
                map.setPaintProperty(l + '-circle', 'circle-radius', makeCircleRadius(l, currentCircleSize, currentTag));
                map.setPaintProperty(l + '-circle', 'circle-color', makeFillColor(currentTag, currentCircleSize === 'missing'));
            });
        }

        function switchCircleSize(sizeMode) {
            localStorage.setItem('osm_circleSize', sizeMode);
            currentCircleSize = sizeMode;
            applyCircleRadius();
        }

        // ── Button listeners ──────────────────────────────────────────────────

        document.querySelectorAll('.layer-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.layer-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                switchLayer(btn.dataset.layer);
            });
        });

        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                switchMode(btn.dataset.mode);
            });
        });

        document.querySelectorAll('.tag-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                switchTag(btn.dataset.tag, btn.dataset.label);
            });
        });

        document.querySelectorAll('.circle-size-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.circle-size-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                switchCircleSize(btn.dataset.circleSize);
            });
        });

        // ── Popup helpers ─────────────────────────────────────────────────────

        const ALL_TAGS = [
            { key: 'nb_siret', label: 'SIRET' },
            { key: 'nb_name', label: 'Name' },
            { key: 'nb_phone', label: 'Phone' },
            { key: 'nb_website_merge', label: 'Website, Fb, Insta' },
            { key: 'nb_email', label: 'Email' },
            { key: 'nb_opening_hours', label: 'Opening hours' },
            { key: 'nb_wheelchair', label: 'Wheelchair' },
        ];

        // Color helper matching the map gradient (red → yellow → green)
        function pctColor(pct) {
            if (pct <= 50) {
                // red (#d73027) → yellow (#fee08b)
                const t = pct / 50;
                const r = Math.round(215 + (254 - 215) * t);
                const g = Math.round(48 + (224 - 48) * t);
                const b = Math.round(39 + (139 - 39) * t);
                return `rgb(${r},${g},${b})`;
            } else {
                // yellow (#fee08b) → green (#1a9850)
                const t = (pct - 50) / 50;
                const r = Math.round(254 + (26 - 254) * t);
                const g = Math.round(224 + (152 - 224) * t);
                const b = Math.round(139 + (80 - 139) * t);
                return `rgb(${r},${g},${b})`;
            }
        }

    function buildHoverHTML(f) {
        const nb_pois = f.nb_pois ?? 0;
        const freshness = f.avg_days_since_pois_update ?? 'N/A';
        const isFreshness = currentTag === '__freshness__';

        let detail = '';
        if (nb_pois > 0) {
            if (isFreshness) {
                detail = `<br/>Fraîcheur moyenne: <b>${freshness}</b> j`;
            } else {
                const val = Math.trunc((f[currentTag] ?? 0) / nb_pois * 100);
                const missing = nb_pois - (f[currentTag] ?? 0);
                detail = `
                 - Fraîcheur moyenne: ${freshness} j<br/>
                ${currentLabel}: <b>${val}%</b><br/>
                POIs sans tag ${currentLabel.replace('Complétude ', '')}: <b>${missing.toLocaleString()}</b>`;
            }
        }

        return `<div style="font-family:sans-serif;font-size:12px;">
        <b>${f.code ?? 'N/A'} - ${f.nom ?? 'N/A'}</b><br/>
        POIs: ${nb_pois.toLocaleString()}${detail}</div>
        ${nb_pois > 0 ? '<div style="color:#aaa;font-size:10px;">Cliquer pour le détail</div>' : ''}`;
    }

    function buildClickHTML(f) {
        const nb_pois = f.nb_pois ?? 0;
        const freshness = f.avg_days_since_pois_update ?? 'N/A';
        const isFreshness = currentTag === '__freshness__';
        const pct = (key) => nb_pois > 0 ? Math.trunc((f[key] ?? 0) / nb_pois * 100) : 0;

        const rows = ALL_TAGS.map(({ key, label }) => {
            const p = pct(key);
            const color = pctColor(p);
            return `<tr>
            <td style="padding:3px 10px 3px 0;color:#555;white-space:nowrap;">${label}</td>
            <td style="padding:3px 0;font-weight:600;color:#222;text-align:right;padding-right:8px;">${p}%</td>
            <td style="padding:3px 0;width:90px;">
                <div style="background:#eee;border-radius:3px;height:7px;overflow:hidden;">
                    <div style="background:${color};border-radius:3px;height:7px;width:${p}%;transition:width 0.3s;"></div>
                </div>
            </td>
        </tr>`;
        }).join('');

        let overpassSection = '';
        if (!isFreshness && (currentLayer === 'communes' || currentLayer === 'epci') && f.osm_id && nb_pois > 0) {
            const overpassUrl = buildOverpassUrl(f.nom, f.osm_id, currentTag);
            if (overpassUrl) {
                overpassSection = `<div>
                <a href="${overpassUrl}" target="_blank"
                   style="display:inline-flex;align-items:center;gap:5px;
                          color:#1a56db;text-decoration:none;font-size:11px;font-weight:500;">
                    Voir sur Overpass Turbo
                </a>
            </div>`;
            }
        }

        const missingLine = (!isFreshness && nb_pois > 0)
            ? `<div style="margin-top:10px;padding-top:8px;border-top:1px solid #eee;">POIs sans tag ${currentLabel.replace('Complétude ', '')}: <b>${(nb_pois - (f[currentTag] ?? 0)).toLocaleString()}</b></div>`
            : '';

        const html_if_pois = nb_pois > 0
            ? ` - Fraîcheur moyenne: <b style="color:#111;">${freshness}</b> jours
            </div>
            <table style="border-collapse:collapse;width:100%;">${rows}</table>
            ${missingLine}`
            : `</div>`;

        return `<div style="font-family:sans-serif;font-size:12px;min-width:220px;">
        <div style="font-weight:700;font-size:14px;margin-bottom:4px;color:#111;">${f.code ?? 'N/A'} - ${f.nom ?? 'N/A'}</div>
        <div style="margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #eee;color:#555;">
            Total POIs: <b style="color:#111;">${nb_pois.toLocaleString()}</b>${html_if_pois}
        ${overpassSection}
    </div>`;
    }

        // ── Popups ────────────────────────────────────────────────────────────

        const hoverPopup = new maplibregl.Popup({ closeButton: false, closeOnClick: false });
        const clickPopup = new maplibregl.Popup({ closeButton: true, closeOnClick: false, maxWidth: '300px' });

        // ── Hover: boundary polygons ──────────────────────────────────────────

        function attachBoundaryHover(fillId) {
            const sourceName = fillId.replace('-fill', '');
            const sourceLayer = sourceName + '_stats';
            let hoveredStateId = null;

            if (!isTouch) {
                map.on('mousemove', fillId, (e) => {
                    if (currentLayer !== sourceName || currentMode !== 'boundary') return;
                    map.getCanvas().style.cursor = 'pointer';
                    hoverPopup.setLngLat(e.lngLat).setHTML(buildHoverHTML(e.features[0].properties)).addTo(map);
                    if (hoveredStateId) {
                        map.setFeatureState({ source: sourceName, sourceLayer, id: hoveredStateId }, { hover: false });
                    }
                    hoveredStateId = e.features[0].id;
                    map.setFeatureState({ source: sourceName, sourceLayer, id: hoveredStateId }, { hover: true });
                });

                map.on('mouseleave', fillId, () => {
                    map.getCanvas().style.cursor = '';
                    hoverPopup.remove();
                    if (hoveredStateId) {
                        map.setFeatureState({ source: sourceName, sourceLayer, id: hoveredStateId }, { hover: false });
                    }
                    hoveredStateId = null;
                });
            }

            map.on('click', fillId, (e) => {
                if (currentLayer !== sourceName || currentMode !== 'boundary') return;
                clickPopup.setLngLat(e.lngLat).setHTML(buildClickHTML(e.features[0].properties)).addTo(map);
            });
        }

        // ── Hover: centroid circles ───────────────────────────────────────────

        function attachCentroidHover(circleId) {
            const sourceName = circleId.replace('-circle', '');
            const sourceLayer = sourceName + '_stats_centroid';
            let hoveredCentroidId = null;

            if (!isTouch) {
                map.on('mousemove', circleId, (e) => {
                    if (currentLayer !== sourceName || currentMode !== 'centroid') return;
                    map.getCanvas().style.cursor = 'pointer';
                    hoverPopup.setLngLat(e.lngLat).setHTML(buildHoverHTML(e.features[0].properties)).addTo(map);

                    if (hoveredCentroidId !== null) {
                        map.setFeatureState(
                            { source: sourceName + '_centroid', sourceLayer, id: hoveredCentroidId },
                            { hover: false }
                        );
                    }
                    hoveredCentroidId = e.features[0].id;
                    map.setFeatureState(
                        { source: sourceName + '_centroid', sourceLayer, id: hoveredCentroidId },
                        { hover: true }
                    );
                });

                map.on('mouseleave', circleId, () => {
                    if (currentMode !== 'centroid') return;
                    map.getCanvas().style.cursor = '';
                    hoverPopup.remove();
                    if (hoveredCentroidId !== null) {
                        map.setFeatureState(
                            { source: sourceName + '_centroid', sourceLayer, id: hoveredCentroidId },
                            { hover: false }
                        );
                    }
                    hoveredCentroidId = null;
                });
            }

            map.on('click', circleId, (e) => {
                if (currentLayer !== sourceName || currentMode !== 'centroid') return;
                clickPopup.setLngLat(e.lngLat).setHTML(buildClickHTML(e.features[0].properties)).addTo(map);
            });
        }


        // ── Init ──────────────────────────────────────────────────────────────

        map.on('load', () => {
            attachBoundaryHover('regions-fill');
            attachBoundaryHover('departements-fill');
            attachBoundaryHover('epci-fill');
            attachBoundaryHover('communes-fill');

            attachCentroidHover('regions-circle');
            attachCentroidHover('departements-circle');
            attachCentroidHover('epci-circle');
            attachCentroidHover('communes-circle');

            document.querySelector('.layer-btn.active')?.click();
            document.querySelector('.mode-btn.active')?.click();
            document.querySelector('.circle-size-btn.active')?.click();
            document.querySelector('.tag-btn.active')?.click();
        });

        map.on('moveend', () => {
            const { lng, lat } = map.getCenter();
            localStorage.setItem('osm_zoom', map.getZoom());
            localStorage.setItem('osm_lng', lng);
            localStorage.setItem('osm_lat', lat);
        });

        async function loadUpdateTimestamp() {
            try {
                const res = await fetch('update_timestamp.json');
                const { updated_at } = await res.json();
                document.getElementById('update-time').innerHTML = `
        <span style="color:#666;font-size:11px;">
            Mise à jour des données OSM: <b>${new Date(updated_at).toLocaleString('fr-FR', {
                    dateStyle: 'medium', timeStyle: 'short'
                })}</b>
        </span>`;
            } catch (e) {
                console.warn('Could not read update timestamp', e);
            }
        }

        loadUpdateTimestamp();
    </script>
</body>
